workflows:
  vm-tests:
    name: Virtual Machine Tests (all branches)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: 17
      groups:
        - codemagic_api_credentials
      vars:
        DEPLOY_WORKFLOW_ID: vm-publish
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Stage 1.1 - Build environment diagnostics
        script: |
          set -euo pipefail
          java -version
          ./gradlew --version

      - name: Stage 1.2 - Run JVM tests
        script: |
          bash pipelines/scripts/vm-tests-run-jvm-tests.sh

      - name: Stage 1.3 - Trigger publish workflow on main after successful tests
        script: |
          bash pipelines/scripts/vm-tests-trigger-publish-on-main.sh

    artifacts:
      - build/reports/**/*
      - build/test-results/**/*

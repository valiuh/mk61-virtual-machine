workflows:
  vm-tests:
    name: Virtual Machine Tests
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: 17
      groups:
        - codemagic_api_credentials
      vars:
        DEPLOY_WORKFLOW_ID: vm-publish
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Stage 1.1 - Build environment diagnostics
        script: |
          set -euo pipefail
          java -version
          ./gradlew --version

      - name: Stage 1.2 - Run JVM tests
        script: |
          bash pipelines/scripts/vm-tests-run-jvm-tests.sh

      - name: Stage 1.3 - Trigger publish workflow on main after successful tests
        script: |
          bash pipelines/scripts/vm-tests-trigger-publish-on-main.sh

    artifacts:
      - build/reports/**/*
      - build/test-results/**/*

  vm-publish:
    name: Virtual Machine Publish To Maven Central
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      java: 17
      groups:
        - maven_central_publish_credentials
    cache:
      cache_paths:
        - ~/.gradle/caches
        - ~/.gradle/wrapper
    scripts:
      - name: Stage 2.1 - Enforce main branch
        script: |
          set -euo pipefail
          if [ "${CM_BRANCH}" != "main" ]; then
            echo "This workflow is restricted to main. Current branch: ${CM_BRANCH}"
            exit 1
          fi

      - name: Stage 2.2 - Validate publish secrets
        script: |
          bash pipelines/scripts/vm-publish-validate-secrets.sh

      - name: Stage 2.3 - Publish to Maven Central
        script: |
          bash pipelines/scripts/vm-publish-to-maven-central.sh

    artifacts:
      - build/reports/**/*
      - build/publications/**/*
      - build/test-results/**/*
